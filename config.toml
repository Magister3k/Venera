# Конфигурация приложения Venera
# Система сбора идентификаторов в потоке пакетных данных

# ============================================================================
# Generic - Общие настройки
# ============================================================================
[Generic]
# Режим работы приложения: "tray" (системный трей) или "service" (служба Windows)
mode = "tray"

# Автоматический старт процессов обработки при запуске приложения
auto_start_processes = false

# Максимальное количество одновременно запущенных процессов обработки (1-20)
max_processes = 10

# Порт веб-сервера для удаленного управления
web_server_port = 8080

# Процент заполнения диска для вывода предупреждения (0-100)
disk_warning_percent = 90

# Процент использования RAM для вывода предупреждения (0-100)
ram_warning_percent = 90

# Максимальное количество записей в очереди перед отправкой на обработку
max_queue_size = 1000

# Интервал времени (в секундах) для периодической обработки данных
processing_interval = 30

# ============================================================================
# Paths - Пути к файлам и ресурсам
# ============================================================================
[Paths]
# Путь к исполняемому файлу Podman
podman_path = "C:\\Program Files\\Podman\\podman.exe"

# Путь к исполняемому файлу Tshark
tshark_path = "C:\\Program Files\\Wireshark\\tshark.exe"

# Путь к файлу фильтрации данных (generic.flt)
filter_file = "settings\\generic.flt"

# Путь к файлу контрольных значений (generic.ctr)
control_file = "settings\\generic.ctr"

# Путь к файлу алертов (generic.alr)
alerts_file = "settings\\generic.alr"

# Путь к образу DragonflyDB в реестре Podman
dragonfly_image = "docker.io/dragonflydb/dragonfly:latest"

# Путь к папке для резервного копирования данных DragonflyDB
dragonfly_backup_path = "C:\\Venera\\dragonfly_backup"

# ============================================================================
# DragonflyDB - Настройки подключения к кэширующей СУБД
# ============================================================================
[DragonflyDB]
# Хост подключения к DragonflyDB
host = "localhost"

# Порт подключения к DragonflyDB
port = 6379

# Пароль для подключения к DragonflyDB (пустой для без пароля)
password = ""

# Номер базы данных (0-15)
database = 0

# Количество записей для обработки в одной партии
batch_size = 1000

# Таймаут ожидания ответа от базы данных (в секундах)
timeout = 30

# ============================================================================
# PostgreSQL - Настройки подключения к итоговой СУБД
# ============================================================================
[PostgreSQL]
# Хост подключения к PostgreSQL
host = "localhost"

# Порт подключения к PostgreSQL
port = 5432

# Имя базы данных (создается автоматически при необходимости)
database = "Venera"

# Имя пользователя для подключения
user = "venera"

# Пароль пользователя
password = "venera_password"

# Максимальное количество одновременных соединений
max_connections = 20

# ============================================================================
# Logging - Настройки логирования
# ============================================================================
[Logging]
# Уровень логирования: debug, info, warn, error, fatal, panic
level = "info"

# Директория для хранения лог-файлов
directory = "Logs"

# Максимальный возраст лог-файлов в днях (старые будут удалены)
max_age_days = 30

# Максимальное количество лог-файлов для сохранения
max_files = 10

# Сжимать старые лог-файлы в формат gz
compress_old_logs = true

# Формат вывода: "text" или "json"
format = "text"
