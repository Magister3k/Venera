# Пример конфигурации процессов для приложения Venera
# Формат: TOML с группировкой по ID процесса

# ============================================================================
# Процесс 1 - Сетевой поток данных
# ============================================================================
[process."net_001"]
# Уникальный идентификатор процесса
id = "net_001"

# Тип источника данных: "network", "folder", "file"
type = "network"

# Название источника
name = "Сетевой поток - Камера 1"

# Для сетевого источника: IP-адрес и UDP-порт
ip = "192.168.1.100"
port = 5000

# ============================================================================
# Процесс 2 - Папка с файлами
# ============================================================================
[process."folder_001"]
id = "folder_001"
type = "folder"
name = "Папка с логами сервера"

# Путь к папке с файлами
path = "C:\\Logs\\Server"

# Режим сканирования подпапок (true - рекурсивно, false - только текущая папка)
scan_subfolders = true

# Режим мониторинга новых файлов (true - отслеживать новые файлы, false - только существующие)
monitor_new_files = true

# ============================================================================
# Процесс 3 - Отдельный файл
# ============================================================================
[process."file_001"]
id = "file_001"
type = "file"
name = "Файл трафика"

# Путь к отдельному файлу
path = "C:\\Data\\traffic.json"
